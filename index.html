<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bhagya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* SCROLL ENABLED */
body{
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow-y:auto;
  display:flex;
  justify-content:center;
}

/* Floating hearts */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation: float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0.5);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

/* Container becomes long */
.container{
  background:white;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fadeIn 1.5s ease;
  margin:40px 0;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Image */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ff758c;
  margin-bottom:15px;
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

/* Name */
.name{
  font-size:28px;
  font-weight:700;
  color:#ff4d6d;
  margin-bottom:10px;
}

/* Button */
.btn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  background:#ff1e4d;
}

/* Letter now scrollable */
.letter{
  display:none;
  margin-top:20px;
  font-size:14px;
  color:#444;
  text-align:left;
  line-height:1.8;
  white-space:pre-line;

  max-height:400px;
  overflow-y:auto;
  padding-right:5px;
}

/* Scrollbar style */
.letter::-webkit-scrollbar{
  width:5px;
}
.letter::-webkit-scrollbar-thumb{
  background:#ff4d6d;
  border-radius:10px;
}

/* Typing effect */
.typing{
  border-right:2px solid black;
  animation:blink 0.7s infinite;
}
@keyframes blink{
  50%{border-color:transparent;}
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<20;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);
}
</script>

<div class="container">
  
  <img src="b1.jpeg" class="profile">

  <div class="name">Bhagya (Pgl) 💖</div>

  <button class="btn" onclick="openLetter()">Open Letter 💌</button>

  <div class="letter" id="letter"></div>

</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
const message = `Dear Bhagya 💖,

There are some moments in life that don’t feel special when they happen…
but later, they become the most beautiful memories ✨.

For me, it all started on 28th July 2023, in the afternoon ☀️.

A teacher asked me to help with something, and honestly, 
I had no idea that one small moment would change so much. 
That’s when I saw you for the first time 👀 
— a girl from arts 🎨, and I was from commerce 📊… two different paths, but somehow, we met 💫.

I didn’t even know your name, but something about you felt so nice, so different 💕.

Gathering a little courage, I came up to you and asked your name…
and you said, “Mera naam Bhagyashri hai” 😊.

And I remember saying, “It’s such a cute name” 😄.
You asked mine too… but who knew that you would forget it later 😅
But it’s okay… some stories are meant to start like that 💫.

The next day was Sunday, 29th July 📅.
I even wrote a letter… but didn’t have the courage to give it 💌.

Then came 30th July — my exam day 📝.
After the exam, I stood outside your class, waiting… with a chocolate in my hand 🍫.
You probably didn’t expect that I would be there…
but for me, that moment meant everything 💖.

Those days… I can never forget 🥹.

On 2nd and 3rd August, I fell sick 🤒.
I wanted to come to school, to see you, to talk to you…
but I couldn’t.
And I couldn’t even message you properly 📵.
It felt strange… like something was missing 💔.

Then finally, around 12th or 14th August, I came back to school 🏫.
I met you again.
Classes had started, but I asked you to come outside for a moment…
and that’s when I asked for your Instagram 📱.

And somehow, I said something I never thought I would say so soon —
“I think I like you” ❤️.

You said you needed time…
and honestly, I was happy 😊.
Because somewhere, I felt there was hope 🌸.

Slowly, we started talking more.
Every day felt new… every conversation felt special ✨.

One evening around 8 PM 🌙, 
you suddenly called and said your phone was not working, so you wouldn’t be able to message.
At that moment, my mom noticed…
and things could have gone wrong.
But the way you handled everything so quickly…
seriously, hats off to you 🙌💖.

From there, every day became a new memory 🌈.

On 28th November, our classes went for a picnic together 🏞️.
It was the first time we really went out together…
and I still remember that day so clearly 💫.

That traditional day…
seeing you in a saree for the first time 👗 —
you looked absolutely beautiful 💖✨.

Then on 7th December, during sports day 🏃‍♂️,
I participated… and you came to support me.
That meant more than you know 💕.

And while going back home,
we walked together for around 4 kilometers 🚶‍♂️🚶‍♀️.
I was tired… and you carried my bag 🎒.
That small gesture… I’ll never forget 🥹💖.

Then came 8th December 2023 — my birthday 🎂.
And you came to my home 🏠.
That made it one of the most special birthdays of my life 💖.

After some days, you gave me a gift —
a panda 🐼.
It was the first gift I ever received from someone like you…
and honestly, it was the best gift ever 🎁💖.

December was full of memories —
our college fest 🎉, exams 📝, everything together.

Then summer holidays passed 🌞…
and in June 2024, we met again in school 🏫.

Same classes, same talks…
but stronger bond 💞.

We faced many problems…
but still, we stayed together 🤝.
And I’m truly happy that you are in my life 💖.

Again, we went for another picnic 🌿,
another sports day 🏃‍♂️…
but this time, something special happened.

I hugged you for the first time 🤗💖.

That moment…
I can’t even explain it.
It was just… perfect ✨.

Then on 1st February 2025, during farewell 🎓,
I participated in a small competition…
and I sang a song for you for the first time 🎶💖.

And that day,
when we met at Dona Paula 🌊…
once again, it became one of the best days 💫.

And even today,
I feel lucky to have you in my life 🍀💖.

No matter what comes,
I know we can face everything together 💪❤️,
and we will succeed ✨.

Thank you…
for coming into my life 🌸,
for staying,
for being you 💖.

You are not just my friend…

you are someone very special to me 💞.

– Always yours,  
Sreejit 💖`;

let index = 0;

function openLetter(){
  document.getElementById("letter").style.display="block";
  document.getElementById("music").play();
  typeEffect();
}

function typeEffect(){
  const letter = document.getElementById("letter");
  if(index < message.length){
    letter.innerHTML += message.charAt(index);
    index++;
    setTimeout(typeEffect, 30);
  }
}
</script>

</body>
</html>
