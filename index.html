<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bhagya 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Floating hearts */
.heart{
  position:absolute;
  color:#ff4d6d;
  animation: float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0.5);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

/* Card */
.container{
  background:white;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* Image */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ff758c;
  margin-bottom:15px;
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

/* Name */
.name{
  font-size:28px;
  font-weight:700;
  color:#ff4d6d;
  margin-bottom:10px;
}

/* Button */
.btn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{
  background:#ff1e4d;
}

/* Letter */
.letter{
  display:none;
  margin-top:15px;
  font-size:14px;
  color:#444;
  text-align:left;
  line-height:1.6;
  white-space:pre-line;
}

/* Typing effect */
.typing{
  border-right:2px solid black;
  animation:blink 0.7s infinite;
}
@keyframes blink{
  50%{border-color:transparent;}
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<20;i++){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"%";
  heart.style.animationDuration=(3+Math.random()*3)+"s";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);
}
</script>

<div class="container">
  
  <!-- Your Image -->
  <img src="b1.jpeg" class="profile">

  <div class="name">Bhagya (Pgl) 💖</div>

  <button class="btn" onclick="openLetter()">Open Letter 💌</button>

  <div class="letter" id="letter"></div>

</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
const message = `Dear Bhagya,

I still remember the day we met — 28 July 2023.
That day didn't feel special at first,
but now when I look back, it feels like something beautiful started.

You are honestly the most beautiful person I have ever met,
not just by looks, but by heart.

The way you care,
the way you help others,
the way you make everything feel warm and easy —
it's rare… very rare.

I have never met someone like you before.
Someone so loving, so kind, so real.

You are my friend…
but honestly,
you are more than just a friend to me.

You are someone I deeply respect,
someone I truly admire,
and someone who means a lot more than words can explain.

No matter what happens,
I just want you to know this —

You are special.
You are important.
And you always will be.

– Yours,  
Sreejit 💖`;

let index = 0;

function openLetter(){
  document.getElementById("letter").style.display="block";
  document.getElementById("music").play();
  typeEffect();
}

function typeEffect(){
  const letter = document.getElementById("letter");
  if(index < message.length){
    letter.innerHTML += message.charAt(index);
    index++;
    setTimeout(typeEffect, 30);
  }
}
</script>

</body>
</html>
